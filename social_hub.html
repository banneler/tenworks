<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenWorks Social Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-nav="crm">
    <div id="global-loader-overlay" class="global-loader-overlay active" aria-live="polite" aria-busy="true">
        <div class="global-loader-content">
            <div class="global-loader-spinner" aria-hidden="true">
                <img src="assets/logo.svg" alt="" class="global-loader-logo-spin" width="80" height="80">
            </div>
            <p class="global-loader-text">Loading…</p>
        </div>
    </div>
    <div class="crm-container">
        <nav class="nav-sidebar" id="nav-container"><script>(function(){try{if(localStorage.getItem('crm-nav-collapsed')==='1')document.getElementById('nav-container').classList.add('nav-sidebar-collapsed');}catch(e){}})();</script><!-- CRM nav loaded by nav-loader.js --></nav>
        
        <main class="content-area">
            <div id="social-hub-view" class="content-view active-view">
                <h2>Social Hub</h2>
                               <h3>AI-Curated Content</h3>
                <div id="ai-articles-container" class="alerts-container">
                    </div>
            </div>
        </main>
    </div>

    <div id="modal-backdrop" class="modal-backdrop hidden">
        <div class="modal-content" style="max-width: 650px;">
            <h3 id="modal-title">Prepare Your Post</h3>
            <div id="modal-body">
                <p style="margin-bottom: 15px;"><strong>Sharing Link:</strong> <a id="modal-article-link" href="#" target="_blank" rel="noopener noreferrer">Article Title</a></p>
                
                <label for="post-text">Suggested Post Text:</label>
                <textarea id="post-text" rows="8" placeholder="AI-generated text will appear here..."></textarea>

                <div id="refine-prompt-section" style="margin-top: 20px;">
                    <label for="custom-prompt-input">Refine with Custom Prompt:</label>
                    <input type="text" id="custom-prompt-input" placeholder="e.g., 'Make it more casual' or 'Add a question at the end'">
                    <button class="btn-primary" id="generate-custom-btn" style="width: 100%; margin-top: 10px;">Regenerate</button>
                </div>
            </div>
            <div id="modal-actions" class="modal-actions">
                 <button id="copy-text-btn" class="btn-secondary">Copy Text</button>
                 <button id="post-to-linkedin-btn" class="btn-primary">Post to LinkedIn</button>
                 <button id="modal-close-btn" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>
    
    <script src="js/nav-loader.js"></script>
    <script type="module" src="js/social_hub.js"></script>
</body>
</html>
