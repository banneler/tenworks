<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description" content="TenWorks Shop Settings: Manage resources, talent, and machinery.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenWorks Shop Settings</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .settings-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .settings-list-item-title {
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 4px;
        }
        .settings-list-item-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .settings-actions {
            display: flex;
            gap: 8px;
        }
    </style>
</head>

<body class="theme-dark" data-nav="erp">
    <div id="global-loader-overlay" class="global-loader-overlay active" aria-live="polite" aria-busy="true">
        <div class="global-loader-content">
            <div class="global-loader-spinner" aria-hidden="true">
                <img src="assets/logo.svg" alt="" class="global-loader-logo-spin" width="80" height="80">
            </div>
            <p class="global-loader-text">Loading…</p>
        </div>
    </div>
    <div class="crm-container">
        <nav class="nav-sidebar" id="nav-container"><script>(function(){try{if(localStorage.getItem('crm-nav-collapsed')==='1')document.getElementById('nav-container').classList.add('nav-sidebar-collapsed');}catch(e){}})();</script></nav>
        
        <main class="content-area">
            <div id="dashboard" class="content-view active-view">
                <div class="header-action-area" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h1 class="page-title">Shop Settings</h1>
                    <button type="button" id="settings-refresh-btn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>

                <div class="settings-grid">
                    <!-- Shop Talent -->
                    <div class="section-card">
                        <div class="section-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h2 class="section-title">Shop Talent</h2>
                            <button id="btn-add-talent" class="btn-primary" style="padding: 4px 10px; font-size: 0.85rem;"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div class="section-card-body" id="settings-talent-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Shop Trades / Resources -->
                    <div class="section-card">
                        <div class="section-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h2 class="section-title">Shop Trades (Resources)</h2>
                            <button id="btn-add-trade" class="btn-primary" style="padding: 4px 10px; font-size: 0.85rem;"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div class="section-card-body" id="settings-trades-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Machines -->
                    <div class="section-card">
                        <div class="section-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h2 class="section-title">Machines & Equipment</h2>
                            <button id="btn-add-machine" class="btn-primary" style="padding: 4px 10px; font-size: 0.85rem;"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div class="section-card-body" id="settings-machines-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Project Templates -->
                    <div class="section-card">
                        <div class="section-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <h2 class="section-title">Project Templates</h2>
                            <button id="btn-add-template" class="btn-primary" style="padding: 4px 10px; font-size: 0.85rem;"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div class="section-card-body" id="settings-templates-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="modal-backdrop" class="modal-backdrop hidden">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>
  
    <script src="js/nav-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/js/tom-select.complete.min.js"></script>
    <script type="module" src="js/shop-settings.js"></script>
</body>

</html>
