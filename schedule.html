<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenWorks Production</title>
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('crm-theme') || 'dark';
            document.documentElement.className = 'theme-' + savedTheme;
            if (!localStorage.getItem('crm-theme')) localStorage.setItem('crm-theme', 'dark');
        })();
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/projects.css"> <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
</head>

<body data-nav="erp">
    <div id="global-loader-overlay" class="global-loader-overlay active" aria-live="polite" aria-busy="true">
        <div class="global-loader-content">
            <div class="global-loader-spinner" aria-hidden="true">
                <img src="assets/logo.svg" alt="" class="global-loader-logo-spin" width="80" height="80">
            </div>
            <p class="global-loader-text">Loading…</p>
        </div>
    </div>
    <div class="crm-container">
        <nav class="nav-sidebar" id="nav-container"><script>(function(){try{if(localStorage.getItem('crm-nav-collapsed')==='1')document.getElementById('nav-container').classList.add('nav-sidebar-collapsed');}catch(e){}})();</script><!-- ERP nav loaded by nav-loader.js --></nav>

        <main class="content-area">
            <div id="data-staleness-banner" class="data-staleness-banner hidden" style="display:none; align-items:center; justify-content:space-between; padding:10px 20px; background:var(--warning-yellow); color:#1a1a1a; font-size:0.9rem;">
                <span><i class="fas fa-info-circle"></i> Data may be stale. Click <strong>Refresh</strong> to load the latest.</span>
                <button type="button" id="staleness-refresh-btn" class="btn-primary" style="padding:6px 14px; font-size:0.85rem;"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="projects-view">
                
               <div class="header-action-area" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div>
        <h2 class="contact-name" style="font-size: 2rem; margin: 0;">Production Schedule</h2>
        <span class="account-name" style="color: var(--text-dim);">Live Operations Dashboard</span>
    </div>
    
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="project-filter-controls" style="display:none; align-items:center; gap:15px; padding:0 15px; border-right:1px solid var(--border-color);">
            <select id="gantt-sort" class="form-control" style="padding:8px 10px; font-size:0.85rem; width:auto; background:var(--bg-medium); color:white;">
                <option value="start_date">Sort: Start Date</option>
                <option value="end_date">Sort: Due Date</option>
            </select>
            
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.85rem; color:var(--text-dim); user-select:none;">
                <input type="checkbox" id="gantt-show-completed"> 
                Show Completed
            </label>
        </div>

     <div class="view-controls" style="background: var(--bg-medium); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; gap: 5px;">
    <button id="view-resource-btn" class="btn-toggle active" style="padding: 8px 16px; border-radius: 6px; border: none; background: var(--primary-blue); color: white; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600;">
        <i class="fas fa-users-cog"></i> Shop Resources
    </button>
    
    <button id="view-machine-btn" class="btn-toggle" style="padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600;">
        <i class="fas fa-industry"></i> Machines
    </button>
    <button id="view-project-btn" class="btn-toggle" style="padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600;">
        <i class="fas fa-project-diagram"></i> Project Timelines
    </button>
</div>

        <button id="schedule-refresh-btn" class="btn-secondary" style="padding: 12px 20px; font-size: 1rem;" title="Reload schedule data"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button id="launch-new-project-btn" class="btn-primary" style="padding: 12px 24px; font-size: 1rem;">
            <i class="fas fa-rocket"></i> &nbsp;Launch Project
        </button>
    </div>
</div>

                <div class="project-metrics-bar">
                    <div class="metric-card">
                        <span class="label">Shop Utilization (this week)</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="metrics-load-bar"></div>
                        </div>
                        <span class="value" id="metrics-load-text">--%</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Total Active Revenue</span>
                        <span class="value" id="metrics-revenue" style="color: var(--warning-yellow);">--</span>
                    </div>
                    <div class="metric-card">
                        <span class="label">Active Projects</span>
                        <span class="value" id="metrics-count">--</span>
                    </div>
                </div>

                <div class="gantt-container-frame erp-condensed">
                    <div class="gantt-sidebar">
                        <div class="gantt-header-cell">Resource / Trade</div>
                        <div id="gantt-resource-list"></div>
                    </div>
                    <div class="gantt-timeline-wrapper">
                        <div class="gantt-timeline-header" id="gantt-date-header"></div>
                        <div class="gantt-grid-body" id="gantt-grid-canvas"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="modal-backdrop" class="modal-backdrop hidden">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <script src="js/nav-loader.js"></script>
    <script type="module" src="js/schedule.js"></script>
</body>
</html>
